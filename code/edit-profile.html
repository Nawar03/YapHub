<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Edit Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>

            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>

            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div><img id="headerAvatar" class="profile-avatar" src="images/logo2.png" alt="Avatar"></div>
                    </a>
                    <span class="header-nickname" id = "myNickname" >myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link">Home</a>
                <a href="following.html" class="nav-link">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link active">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <div class="profile-form">
                <!-- Description Field -->
                <div class="profile-row">
                    <textarea id="bio" class="profile-input profile-textarea" placeholder="Description"></textarea>
                </div>

                <!-- First Name + Last Name -->
                <div class="profile-row profile-row-two">
                    <input id="first_name" type="text" class="profile-input" placeholder="First Name">
                    <input id="last_name" type="text" class="profile-input" placeholder="Last Name">
                </div>

                <!-- Nickname Field -->
                <div class="profile-row">
                    <input id="nickname" type="text" class="profile-input" placeholder="Nickname">
                </div>

                <!-- Email Field -->
                <div class="profile-row">
                    <input id="email" type="email" class="profile-input" placeholder="Email">
                </div>

                <!-- Password Field -->
                <div class="profile-row">
                    <input id="password" type="password" class="profile-input" placeholder="Password">
                </div>

                <!-- Profile and Banner pic Field -->
                <div class="profile-media-buttons">

                    <button type="button" class="settings-btn" id="changeAvatarBtn">
                        Change Profile Picture
                    </button>

                    <br>

                    <button type="button" class="settings-btn" id="changeBannerBtn">
                        Change Banner
                    </button>

                </div>

                <!-- Action Buttons -->
                <div class="profile-actions">
                    <button id="save-btn" class="btn btn-save">Save All Changes</button>
                    <a href="myprofile.html" class="btn btn-cancel">Cancel</a>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
            <div class="right-sidebar-placeholder">
                <p>Future features</p>
            </div>
        </aside>
    </div>

<div id="avatarModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Update Profile Picture</h3>
    <input type="file" id="modalAvatarInput" accept="image/*"><br><br>
    <div class="cropper-container">
      <img id="previewImage" style="max-width:100%; display:none;" />
    </div>
    <div class="modal-buttons">
        <button id="saveAvatarBtn">Save</button>
        <button id="cancelAvatarBtn">Cancel</button>
    </div>
  </div>
</div>

<div id="bannerModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Update Banner Picture</h3>
    <input type="file" id="bannerInput" accept="image/*">
<div class="cropper-container">
    <img id="bannerPreview" style="max-width:100%; display:none;" />
</div>
<div class="modal-buttons">
    <button id="saveBannerBtn">Save</button>
    <button id="cancelBannerBtn">Cancel</button>
</div>
  </div>
</div>

    <script src="js/script.js"></script>
    <script>
  document.addEventListener("DOMContentLoaded", () => {
  let userId;

  fetch("/me", { credentials: "include" })
    .then(res => res.json())
    .then(data => {
      if (!data.loggedIn) {
        window.location.href = "/login.html";
        return;
      }
      userId = data.user.user_id;

      return fetch(`/api/users/${userId}`, { credentials: "include" });
    })
    .then(res => res.json())
    .then(profile => {
      document.getElementById("bio").value = profile.bio || "";
      document.getElementById("first_name").value = profile.first_name;
      document.getElementById("last_name").value = profile.last_name;
      document.getElementById("nickname").value = profile.nickname;
      document.getElementById("email").value = profile.email;
      document.getElementById("password").value = profile.password;

    })
    .catch(err => console.error(err));

  const saveBtn = document.getElementById("save-btn");
  saveBtn.addEventListener("click", () => {
    if (!userId) {
      alert("User not loaded yet. Try again.");
      return;
    }

    const updatedData = {
      bio: document.getElementById("bio").value,
      first_name: document.getElementById("first_name").value,
      last_name: document.getElementById("last_name").value,
      nickname: document.getElementById("nickname").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    };

    fetch(`/api/users/${userId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(updatedData)
    })
      .then(res => res.json())
      .then(data => {
        alert(data.message || "Profile updated");
      })
      .catch(err => console.error(err));
  });
});

document.addEventListener("DOMContentLoaded", () => {
  const profilePic = document.getElementById('profilePic');
  const modal = document.getElementById('avatarModal');
  const fileInput = document.getElementById('modalAvatarInput');
  const preview = document.getElementById('previewImage');
  const changeBtn = document.getElementById('changeAvatarBtn');
  const saveBtn = document.getElementById('saveAvatarBtn');
  const cancelBtn = document.getElementById('cancelAvatarBtn');
  let cropper;

  // Open modal
  changeBtn.addEventListener('click', () => {
    modal.style.display = 'flex';
  });

  // Load image into cropper
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = 'block';

      // Destroy old cropper
      if (cropper) cropper.destroy();

      // Initialize Cropper
      cropper = new Cropper(preview, {
        aspectRatio: 1,
        viewMode: 1,
        autoCropArea: 1,
        movable: true,
        zoomable: true
      });
    };
    reader.readAsDataURL(file);
  });

  // Save cropped image
  saveBtn.addEventListener('click', async () => {
    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
      width: 300,
      height: 300
    });

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));

    const userId = sessionStorage.getItem("user_id");
    const formData = new FormData();
    formData.append('avatar', blob, 'avatar.png');

    const res = await fetch(`/api/users/${userId}/avatar`, {
      method: 'POST',
      body: formData,
      credentials: 'include'
    });

    const data = await res.json();

    if (res.ok) {
      const headerAvatar = document.getElementById('headerAvatar');
        if (data.path) {
        headerAvatar.src = data.path + "?t=" + new Date().getTime();
        }
      alert("Profile picture updated!");
      modal.style.display = 'none';
      fileInput.value = "";
      preview.style.display = "none";
      cropper.destroy();
    }
  });

  // Cancel
  cancelBtn.addEventListener('click', () => {
    modal.style.display = 'none';
    fileInput.value = "";
    preview.style.display = "none";
    if (cropper) cropper.destroy();
  });

  const bannerPic = document.getElementById('bannerPic');
  const bannerModal = document.getElementById('bannerModal');
  const bannerInput = document.getElementById('bannerInput');
  const bannerPreview = document.getElementById('bannerPreview');
  const changeBannerBtn = document.getElementById('changeBannerBtn');
  const saveBannerBtn = document.getElementById('saveBannerBtn');
  const cancelBannerBtn = document.getElementById('cancelBannerBtn');
  let bannerCropper;

  changeBannerBtn.addEventListener('click', () => {
    bannerModal.style.display = 'flex'; });

bannerInput.addEventListener('change', () => {
  const file = bannerInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = (e) => {
    bannerPreview.src = e.target.result;
    bannerPreview.style.display = 'block';

    // destroy old cropper safely
    if (bannerCropper) {
      bannerCropper.destroy();
      bannerCropper = null;
    }

    // wait 50ms so DOM updates before Cropper init
    setTimeout(() => {
      bannerCropper = new Cropper(bannerPreview, {
        aspectRatio: 3 / 1,
        viewMode: 1,
        autoCropArea: 1,
        movable: true,
        zoomable: true
      });
    }, 50);
  };

  reader.readAsDataURL(file);
});

saveBannerBtn.addEventListener('click', async () => {
  if (!bannerCropper) {
    alert("Select a banner image first!");
    return;
  }

  try {
    const canvas = bannerCropper.getCroppedCanvas({
      width: 1200,
      height: 400
    });

    const blob = await new Promise(resolve =>
      canvas.toBlob(resolve, 'image/png')
    );

    const formData = new FormData();
    formData.append('banner', blob, 'banner.png');

    const userId = sessionStorage.getItem("user_id");

    const res = await fetch(`/api/users/${userId}/banner`, {
      method: 'POST',
      body: formData,
      credentials: 'include'
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Upload failed");
    }

    const bannerImg = document.getElementById("profileBanner");

    if (data.path && bannerImg) {
      bannerImg.src = data.path + "?t=" + Date.now();
    }

    alert("Banner updated!");
    bannerModal.style.display = 'none';
    bannerInput.value = "";
    bannerPreview.style.display = "none";

    if (bannerCropper) {
      bannerCropper.destroy();
      bannerCropper = null;
    }

  } catch (err) {
    console.error("Banner upload failed:", err);
    alert("Something went wrong uploading banner");
  }
});

cancelBannerBtn.addEventListener('click', () => {
  bannerModal.style.display = 'none';
  bannerInput.value = "";
  bannerPreview.style.display = "none";
  if (bannerCropper) bannerCropper.destroy();
});
});
    </script>
</body>
</html>
