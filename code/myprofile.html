<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - My Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>

            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>

            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div><img id="headerAvatar" class="profile-avatar" src="images/logo2.png" alt="Avatar"></div>
                    </a>
                    <span class="header-nickname" id = "myNickname" >myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link">Home</a>
                <a href="following.html" class="nav-link">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link active">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <div class="profile-header-container">
                <!-- Edit Profile Button (Top-Right) -->
                <a href="edit-profile.html" class="btn edit-profile-btn">Edit Profile</a>

                <!-- Profile Header Content -->
                <div class="profile-header">
                    <!-- Left Side: Profile Info -->
                    <div class="profile-left">
                        <img id="profilePic" src="images/logo2.png" alt="Profile Logo" class="profile-logo">
                        <input type="file" id="avatarInput" style="display:none;" accept="image/*">
                        <div class="profile-info">
                            <div class="profile-name-row">
                                <h2 class="profile-name"  id="profile-handle">Name</h2>
                            </div>
                            <p class="profile-handle">@nickname</p>
                            <p class="profile-desc" id="profile-bio"></p>
                            <div class="profile-stats">
                                <a id="following-link" href="#">
                                <span class="stat" id="following-count">0 Following</span>
                                </a> <a id="followers-link" href="#">
                                <span class="stat" id="followers-count">0 Followers</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
          <div class="suggestions-box">
            <p class="suggestions-title">People you may know</p>
            <div id="suggestions-list"></div>
          </div>
        </aside>
    </div>

<div id="avatarModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Update Profile Picture</h3>

    <input type="file" id="modalAvatarInput" accept="image/*"><br><br>

    <div class="cropper-container">
      <img id="previewImage" style="max-width:100%; display:none;" />
    </div>

    <div class="modal-buttons">
        <button id="saveAvatarBtn">Save</button>
        <button id="cancelAvatarBtn">Cancel</button>
    </div>
  </div>
</div>

    <script>
        if (!sessionStorage.getItem('user_id')) {
            window.location.href = 'index.html';
        }
    </script>
    <script src="js/script.js"></script>
    <script>
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const profileUserId = params.get("user_id") || sessionStorage.getItem("user_id");

  if (profileUserId) {
    const followersLink = document.getElementById("followers-link");
    const followingLink = document.getElementById("following-link");

    if (followersLink) {
      followersLink.href = `followersList.html?user_id=${profileUserId}`;
    }
    if (followingLink) {
      followingLink.href = `followingList.html?user_id=${profileUserId}`;
    }
  }
});

async function loadMyProfile() {

  try {

    const meRes = await fetch("/me", {
      credentials: "include"
    });

    const meData = await meRes.json();

    const userId = meData.user.user_id;

    const res = await fetch(`/api/users/${userId}`);
    const data = await res.json();

    document.getElementById("profile-handle").textContent =
      data.first_name + " " + data.last_name;

    document.querySelector(".profile-handle").textContent =
      "@" + data.nickname;

    document.getElementById("followers-count").textContent =
      data.followers + " Followers";

    document.getElementById("following-count").textContent =
      data.following + " Following";

    document.getElementById("profile-bio").textContent =
      data.bio || "No bio yet";

    document.getElementById("profilePic").src =
        data.filepath || "images/logo2.png";
        
    const headerAvatar = document.getElementById("headerAvatar");
        if (headerAvatar) {
            headerAvatar.src = data.filepath || "images/logo2.png";
        }

  } catch (err) {
    console.error("Profile load error:", err);
  }

}
loadMyProfile();

document.addEventListener("DOMContentLoaded", () => {
  const profilePic = document.getElementById('profilePic');
  const modal = document.getElementById('avatarModal');
  const fileInput = document.getElementById('modalAvatarInput');
  const preview = document.getElementById('previewImage');
  const saveBtn = document.getElementById('saveAvatarBtn');
  const cancelBtn = document.getElementById('cancelAvatarBtn');
  let cropper;

  // Open modal
  profilePic.addEventListener('click', () => {
    modal.style.display = 'flex';
  });

  // Load image into cropper
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = 'block';

      // Destroy old cropper
      if (cropper) cropper.destroy();

      // Initialize Cropper
      cropper = new Cropper(preview, {
        aspectRatio: 1,
        viewMode: 1,
        autoCropArea: 1,
        movable: true,
        zoomable: true
      });
    };
    reader.readAsDataURL(file);
  });

  // Save cropped image
  saveBtn.addEventListener('click', async () => {
    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
      width: 300,
      height: 300
    });

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));

    const userId = sessionStorage.getItem("user_id");
    const formData = new FormData();
    formData.append('avatar', blob, 'avatar.png');

    const res = await fetch(`/api/users/${userId}/avatar`, {
      method: 'POST',
      body: formData,
      credentials: 'include'
    });

    const data = await res.json();

    if (data.path) {
      profilePic.src = data.path;
      modal.style.display = 'none';
      fileInput.value = "";
      preview.style.display = "none";
      cropper.destroy();
    }
  });

  // Cancel
  cancelBtn.addEventListener('click', () => {
    modal.style.display = 'none';
    fileInput.value = "";
    preview.style.display = "none";
    if (cropper) cropper.destroy();
  });
});
    </script>
<script>
(function() {
  const userId = sessionStorage.getItem('user_id');
  if (!userId) return;
  const list = document.getElementById('suggestions-list');
  if (!list) return;

  fetch(`/api/suggestions/${userId}`)
    .then(res => res.json())
    .then(users => {
      if (!users.length) {
        list.innerHTML = '<p style="font-size:0.85rem;color:#999;">No suggestions right now.</p>';
        return;
      }
      users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
          <span class="suggestion-nickname">${user.nickname}</span>
          <button class="follow-suggestion-btn" data-user-id="${user.user_id}">Follow</button>
        `;
        const btn = item.querySelector('.follow-suggestion-btn');
        btn.addEventListener('click', async () => {
          await fetch(`/api/follow/${user.user_id}`, {
            method: 'POST',
            credentials: 'include'
          });
          btn.textContent = 'Following';
          btn.classList.add('following');
          btn.disabled = true;
        });
        list.appendChild(item);
      });
    })
    .catch(() => {
      list.innerHTML = '<p style="font-size:0.85rem;color:#999;">Could not load suggestions.</p>';
    });
})();
</script>
</body>
</html>
