<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>

            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>

            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div class="profile-avatar"></div>
                    </a>
                    <span class="header-nickname" id = "myNickname" >myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link">Home</a>
                <a href="following.html" class="nav-link">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <div class="profile-header-container">
                <!-- Follow Button (Top-Right) -->
                <button class="btn edit-profile-btn" id="followBtn">Follow</button>

                <!-- Profile Header Content -->
                <div class="profile-header">
                    <!-- Left Side: Profile Info -->
                    <div class="profile-left">
                        <img src="images/logo2.png" alt="Profile Logo" class="profile-logo">
                        <div class="profile-info">
                            <div class="profile-name-row">
                                <h2 class="profile-name" id="profile-handle">Name</h2>
                                <div class="profile-desc">
                                    <p>Description</p>
                                </div>
                            </div>
                            <p class="profile-handle">@nickname</p>
                            <div class="profile-stats">
                                <a id="following-link" href="#">
                                <span class="stat" id="following-count">0 Following</span>
                                </a> <a id="followers-link" href="#">
                                <span class="stat" id="followers-count">0 Followers</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
            <div class="right-sidebar-placeholder">
                <p>Future features</p>
            </div>
        </aside>
    </div>

    <script src="js/script.js"></script>
    <script>
const params = new URLSearchParams(window.location.search);
const userId = params.get("user_id");

fetch(`/api/users/${userId}`, {
    credentials: "include"})
  .then(res => res.json())
  .then(data => {

    document.getElementById("profile-handle").textContent =
      data.first_name + " " + data.last_name;

    document.querySelector(".profile-handle").textContent =
      "@" + data.nickname;

    document.getElementById("followers-count").textContent =
      data.followers + " Followers";

    document.getElementById("following-count").textContent =
      data.following + " Following";

 })
async function loadFollowButton(profileUserId) {
  const followBtn = document.getElementById("followBtn");
  const followersCountEl = document.getElementById("followers-count");
  if (!followBtn) return;
  try {
    const res = await fetch(`/api/follows/check/${profileUserId}`, {
      credentials: "include"
    });
    if (!res.ok) return;
    const data = await res.json();
    // Set initial button text correctly
    followBtn.textContent = data.isFollowing ? "Following" : "Follow";

    //handler for follow/unfollow
    followBtn.addEventListener("click", async () => {
      const currentlyFollowing = followBtn.textContent === "Following";
      const endpoint = currentlyFollowing
        ? `/api/unfollow/${profileUserId}`
        : `/api/follow/${profileUserId}`;

      try {
        const toggleRes = await fetch(endpoint, {
          method: "POST",
          credentials: "include"
        });
        const result = await toggleRes.json();

        if (result.success) {
          followBtn.textContent = currentlyFollowing ? "Follow" : "Following";

          // Update followers count live
          if (followersCountEl) {
            const match = followersCountEl.textContent.match(/\d+/);
            let count = match ? parseInt(match[0], 10) : 0;
            count = currentlyFollowing ? count - 1 : count + 1;
            followersCountEl.textContent = `${count} Followers`;
          }
        }
      } catch (err) {
        console.error("Follow/unfollow failed:", err); }
    });
  } catch (err) {
    console.error("Could not load follow status:", err); }
}
document.addEventListener("DOMContentLoaded", () => {
  if (userId) {
    loadFollowButton(userId); }
});
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const profileUserId = params.get("user_id") || sessionStorage.getItem("user_id");

  if (profileUserId) {
    const followersLink = document.getElementById("followers-link");
    const followingLink = document.getElementById("following-link");

    if (followersLink) {
      followersLink.href = `followersList.html?user_id=${profileUserId}`;
    }
    if (followingLink) {
      followingLink.href = `followingList.html?user_id=${profileUserId}`;
    }
  }
});
    </script>
</body>
</html>
