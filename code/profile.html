    <script>
const params = new URLSearchParams(window.location.search);
const userId = params.get("user_id");

fetch(`/api/users/${userId}`, {
    credentials: "include"})
  .then(res => res.json())
  .then(data => {

    document.getElementById("profile-handle").textContent =
      data.first_name + " " + data.last_name;

    document.querySelector(".profile-handle").textContent =
      "@" + data.nickname;

    document.getElementById("followers-count").textContent =
      data.followers + " Followers";

    document.getElementById("following-count").textContent =
      data.following + " Following";
    
    document.getElementById("profile-bio").textContent =
      data.bio || "No bio yet";

    document.getElementById("profilePic").src =
        data.filepath || "images/logo2.png";

    document.getElementById("profile-banner").src =
      data.banner_filepath || "images/default-banner.jpg";

 })
async function loadFollowButton(profileUserId) {
  const followBtn = document.getElementById("followBtn");
  const followersCountEl = document.getElementById("followers-count");
  if (!followBtn) return;
  try {
    const res = await fetch(`/api/follows/check/${profileUserId}`, {
      credentials: "include"
    });
    if (!res.ok) return;
    const data = await res.json();
    // Set initial button text correctly
    followBtn.textContent = data.isFollowing ? "Following" : "Follow";

    //handler for follow/unfollow
    followBtn.addEventListener("click", async () => {
      const currentlyFollowing = followBtn.textContent === "Following";
      const endpoint = currentlyFollowing
        ? `/api/unfollow/${profileUserId}`
        : `/api/follow/${profileUserId}`;

      try {
        const toggleRes = await fetch(endpoint, {
          method: "POST",
          credentials: "include"
        });
        const result = await toggleRes.json();

        if (result.success) {
          followBtn.textContent = currentlyFollowing ? "Follow" : "Following";

          // Update followers count live
          if (followersCountEl) {
            const match = followersCountEl.textContent.match(/\d+/);
            let count = match ? parseInt(match[0], 10) : 0;
            count = currentlyFollowing ? count - 1 : count + 1;
            followersCountEl.textContent = `${count} Followers`;
          }
        }
      } catch (err) {
        console.error("Follow/unfollow failed:", err); }
    });
  } catch (err) {
    console.error("Could not load follow status:", err); }
}
document.addEventListener("DOMContentLoaded", () => {
  if (userId) {
    loadFollowButton(userId); }
});
    </script>
