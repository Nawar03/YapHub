<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Following</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>

            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>

            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div><img id="headerAvatar" class="profile-avatar" src="images/logo2.png" alt="Avatar"></div>
                    </a>
                    <span class="header-nickname" id = "myNickname" >myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link">Home</a>
                <a href="following.html" class="nav-link active">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <form class="search-container">
                <input type="text" class="search-input" id="user-search" placeholder="Search...">
                <div id="search-results"></div>
            </form>
            <div id="following-feed" style="display:flex;flex-direction:column;align-items:flex-start;gap:1rem;padding:1rem;">
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
          <div class="suggestions-box">
            <p class="suggestions-title">People you may know</p>
            <div id="suggestions-list"></div>
          </div>
        </aside>
    </div>

    <script>
        if (!sessionStorage.getItem('user_id')) {
            window.location.href = 'index.html';
        }
    </script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

    // PROFILE PAGE
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("user_id");

    if (userId) loadProfile(userId);

    async function loadProfile(userId) {
        try {
            const res = await fetch(`/api/users/${userId}`);
            if (!res.ok) throw new Error("User not found");
            const data = await res.json();

            document.getElementById("profile-handle").textContent = `${data.first_name} ${data.last_name}`;
            document.querySelector(".profile-handle").textContent = `@${data.nickname}`;
            document.getElementById("following-count").textContent = `${data.following} Following`;
            document.getElementById("followers-count").textContent = `${data.followers} Followers`;
            document.querySelector(".profile-logo").src = data.profile_picture || "images/default-avatar.png";

            const followBtn = document.getElementById("follow-btn");
            followBtn.textContent = data.isFollowing ? "Unfollow" : "Follow";
            followBtn.onclick = async () => {
                const action = data.isFollowing ? "unfollow" : "follow";
                const followRes = await fetch(`/api/users/${data.username}/follow`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ action })
                });
                const followData = await followRes.json();
                data.isFollowing = !data.isFollowing;
                followBtn.textContent = data.isFollowing ? "Unfollow" : "Follow";
                document.getElementById("followers-count").textContent = `${followData.followers} Followers`;
            };
        } catch (err) {
            console.error(err);
        }
    }

const searchInput = document.getElementById("user-search");
const resultsContainer = document.getElementById("search-results");

let debounceTimeout;

if (searchInput) {
  searchInput.addEventListener("input", () => {
    const query = searchInput.value.trim();

    clearTimeout(debounceTimeout);

    if (!query) {
      resultsContainer.innerHTML = "";
      return;
    }

    debounceTimeout = setTimeout(async () => {
      try {
        const res = await fetch(`/api/search/users?q=${encodeURIComponent(query)}`);
        const users = await res.json();

        resultsContainer.innerHTML = "";

        if (users.length === 0) {
          resultsContainer.innerHTML = "<p>No users found</p>";
          return;
        }

        users.forEach(user => {
          const div = document.createElement("div");
          div.textContent = "@" + user.nickname;
          div.classList.add("search-item");

          // clicking on name goes to their profile
          div.addEventListener("click", async () => {
            const meRes = await fetch("/me", { credentials: "include" });
            const meData = await meRes.json();

            if (meData.loggedIn && meData.user.user_id === user.user_id) {
              window.location.href = "myProfile.html";
            } else {
              window.location.href = `/profile.html?user_id=${user.user_id}`;
            }
          });

          resultsContainer.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        resultsContainer.innerHTML = "<p>Error loading results</p>";
      }
    }, 300); // debounce
  });
} });

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-container")) {
    resultsContainer.innerHTML = "";
  }
});
const searchForm = document.querySelector('.search-container');
searchForm.addEventListener('submit', (e) => {
    e.preventDefault();
});
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const feedEl = document.getElementById('following-feed');
        const userId = sessionStorage.getItem('user_id');
        if (!feedEl || !userId) return;

        fetch(`/following-posts?user_id=${userId}`)
          .then(res => res.json())
          .then(posts => {
            if (!Array.isArray(posts) || posts.length === 0) {
              feedEl.innerHTML = '<p style="color:#999;padding:1rem;">No posts from people you follow yet.</p>';
              return;
            }

            posts.forEach(post => {
              const postCard = document.createElement('div');
              postCard.className = 'post-card';
              postCard.dataset.postId = post.post_id;
              postCard.innerHTML = `
  <div class="post-header">
    <div class="post-header-left">
      <span class="post-nickname">${post.nickname}</span>
    </div>
    <div class="post-header-right">
      <span class="post-time">${getTimeLeft(post.expires_at)}</span>
    </div>
  </div>
  <div class="post-body">
    <p class="post-text">${post.content}</p>
  </div>
  <div class="post-actions">
    <button class="post-action-btn">👍 Like</button>
    <button class="post-action-btn comment-toggle-btn">💬 Comment</button>
  </div>
  <div class="comments-section" style="display: none;">
    <div class="comments-list"></div>
    <div class="comment-input-row">
      <input type="text" class="comment-input" placeholder="Write a comment...">
      <button class="submit-comment-btn">Post</button>
    </div>
    <p class="comment-message"></p>
  </div>
`;

              const postId = parseInt(post.post_id, 10);
              const likeBtn = postCard.querySelector('.post-action-btn');
              const toggleBtn = postCard.querySelector('.comment-toggle-btn');
              const commentsSection = postCard.querySelector('.comments-section');
              const commentsList = postCard.querySelector('.comments-list');
              const submitBtn = postCard.querySelector('.submit-comment-btn');
              const commentInput = postCard.querySelector('.comment-input');
              const commentMessage = postCard.querySelector('.comment-message');

              async function loadLikes() {
                try {
                  const res = await fetch(`/posts/${postId}/likes?user_id=${userId}`);
                  const data = await res.json();
                  likeBtn.textContent = `👍 Like ${data.count}`;
                  if (data.liked) {
                    likeBtn.classList.add('liked');
                  } else {
                    likeBtn.classList.remove('liked');
                  }
                  likeBtn.dataset.liked = data.liked ? 'true' : 'false';
                } catch (err) {
                  console.error('Error loading likes:', err);
                }
              }

              loadLikes();

              likeBtn.addEventListener('click', async () => {
                const isLiked = likeBtn.dataset.liked === 'true';
                try {
                  const res = await fetch('/likes', {
                    method: isLiked ? 'DELETE' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_id: postId, user_id: userId })
                  });
                  const data = await res.json();
                  if (data.success || (!isLiked && data.message === 'Already liked')) {
                    await loadLikes();
                  }
                } catch (err) {
                  console.error('Error toggling like:', err);
                }
              });

              async function loadComments() {
                try {
                  const res = await fetch(`/posts/${postId}/comments`);
                  const comments = await res.json();
                  commentsList.innerHTML = '';
                  comments.forEach(comment => {
                    const p = document.createElement('p');
                    p.style.display = 'flex';
                    p.style.justifyContent = 'flex-start';
                    p.style.alignItems = 'center';
                    p.innerHTML = `
                      <span style="font-size:12px;color:#6b7280;margin-right:8px;white-space:nowrap;font-weight:bold;">@${comment.nickname}</span>
                      <span style="flex:1;">${comment.content}</span>
                      <span style="font-size:11px;color:#9ca3af;margin-left:12px;white-space:nowrap;">${getCommentAge(comment.created_at)}</span>
                    `;
                    commentsList.appendChild(p);
                  });
                } catch (err) {
                  commentMessage.textContent = 'Error loading comments';
                }
              }

              toggleBtn.addEventListener('click', async () => {
                const isHidden = commentsSection.style.display === 'none' || commentsSection.style.display === '';
                if (isHidden) {
                  commentsSection.style.display = 'block';
                  await loadComments();
                } else {
                  commentsSection.style.display = 'none';
                }
              });

              submitBtn.addEventListener('click', async () => {
                const content = commentInput.value.trim();
                if (!userId) {
                  commentMessage.textContent = 'You must be logged in to comment';
                  return;
                }
                if (!content) {
                  commentMessage.textContent = 'Comment cannot be empty';
                  return;
                }
                try {
                  const res = await fetch('/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_id: postId, user_id: userId, content })
                  });
                  const result = await res.json();
                  if (result.success) {
                    commentInput.value = '';
                    commentMessage.textContent = 'Comment added';
                    await loadComments();
                  } else {
                    commentMessage.textContent = result.message || 'Error adding comment';
                  }
                } catch (err) {
                  commentMessage.textContent = 'Network error';
                }
              });

              feedEl.appendChild(postCard);
            });

            setInterval(() => {
              const timeSpans = feedEl.querySelectorAll('.post-time');
              posts.forEach((post, index) => {
                if (timeSpans[index]) {
                  timeSpans[index].textContent = getTimeLeft(post.expires_at);
                }
              });
            }, 60000);
          })
          .catch(err => console.error('Error loading following posts:', err));
      });
    </script>
<script>
(function() {
  const userId = sessionStorage.getItem('user_id');
  if (!userId) return;
  const list = document.getElementById('suggestions-list');
  if (!list) return;

  fetch(`/api/suggestions/${userId}`)
    .then(res => res.json())
    .then(users => {
      if (!users.length) {
        list.innerHTML = '<p style="font-size:0.85rem;color:#999;">No suggestions right now.</p>';
        return;
      }
      users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
          <span class="suggestion-nickname">${user.nickname}</span>
          <button class="follow-suggestion-btn" data-user-id="${user.user_id}">Follow</button>
        `;
        const btn = item.querySelector('.follow-suggestion-btn');
        btn.addEventListener('click', async () => {
          await fetch(`/api/follow/${user.user_id}`, {
            method: 'POST',
            credentials: 'include'
          });
          btn.textContent = 'Following';
          btn.classList.add('following');
          btn.disabled = true;
        });
        list.appendChild(item);
      });
    })
    .catch(() => {
      list.innerHTML = '<p style="font-size:0.85rem;color:#999;">Could not load suggestions.</p>';
    });
})();
</script>
</body>
</html>
