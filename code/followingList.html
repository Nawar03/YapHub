<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Feed</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>
            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>
            <!-- Right: User -->
            <div class="header-right">
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div class="profile-avatar"></div>
                    </a>
                    <span class="header-nickname" id="myNickname">myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link active">Home</a>
                <a href="following.html" class="nav-link">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <h2 class="header-center">Following</h2>
            <ul id="following-list"></ul>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
          <div class="suggestions-box">
            <p class="suggestions-title">People you may know</p>
            <div id="suggestions-list"></div>
          </div>
        </aside>
    </div>

    <script>
        if (!sessionStorage.getItem('user_id')) {
            window.location.href = 'index.html';
        }
    </script>
    <script src="js/script.js"></script>
    <script>
     document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("user_id");
  if (!userId) return;

  const list = document.getElementById("following-list");
  if (!list) return;

  try {
    const res = await fetch(`/api/following/${userId}`);
    if (!res.ok) throw new Error("Failed to fetch followed users");
    const users = await res.json();

    list.innerHTML = "";

    if (users.length === 0) {
      list.innerHTML = "<li>No following yet.</li>";
      return;
    }

    users.forEach(user => {
      const li = document.createElement("li");
      li.innerHTML = `
        <a href="profile.html?user_id=${user.user_id}" class="user-card">
          <strong>${user.nickname}</strong>
        </a>
      `;
      list.appendChild(li);
    });
  } catch (err) {
    console.error(err);
    list.innerHTML = "<li>Error loading following</li>";
  }
});
    </script>
<script>
(function() {
  const userId = sessionStorage.getItem('user_id');
  if (!userId) return;
  const list = document.getElementById('suggestions-list');
  if (!list) return;

  fetch(`/api/suggestions/${userId}`)
    .then(res => res.json())
    .then(users => {
      if (!users.length) {
        list.innerHTML = '<p style="font-size:0.85rem;color:#999;">No suggestions right now.</p>';
        return;
      }
      users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
          <div class="suggestion-avatar"></div>
          <span class="suggestion-nickname">${user.nickname}</span>
          <button class="follow-suggestion-btn" data-user-id="${user.user_id}">Follow</button>
        `;
        const btn = item.querySelector('.follow-suggestion-btn');
        btn.addEventListener('click', async () => {
          await fetch(`/api/follow/${user.user_id}`, {
            method: 'POST',
            credentials: 'include'
          });
          btn.textContent = 'Following';
          btn.classList.add('following');
          btn.disabled = true;
        });
        list.appendChild(item);
      });
    })
    .catch(() => {
      list.innerHTML = '<p style="font-size:0.85rem;color:#999;">Could not load suggestions.</p>';
    });
})();
</script>
</body>
</html>
