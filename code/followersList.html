<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YapHub - Feed</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="feed-page">
    <!-- Header -->
    <header class="feed-header">
        <div class="header-content">
            <!-- Left: Logo -->
            <div class="header-left">
                <img src="images/logo.png" alt="YapHub Logo" class="header-logo">
            </div>
            <!-- Center: Title -->
            <div class="header-center">
                <h1 class="header-title">YapHub</h1>
            </div>
            <!-- Right: User -->
            <div class="header-right">
                <div class="notification-wrapper">
                    <button class="notification-bell" id="notificationBell" onclick="toggleNotifications()" style="position:relative;">
                      <span class="notification-badge" id="notifBadge"></span>
                      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white">
                        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                      </svg>
                    </button>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <p class="notification-empty">No notifications yet</p>
                    </div>
                </div>
                <div class="header-profile">
                    <a href="myprofile.html" class="profile-avatar-link">
                        <div><img id="headerAvatar" class="profile-avatar" src="images/logo2.png" alt="Avatar"></div>
                    </a>
                    <span class="header-nickname" id="myNickname">myNickname</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Layout -->
    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="feed-sidebar-left">
            <div class="nav-links">
                <a href="feed.html" class="nav-link active">Home</a>
                <a href="following.html" class="nav-link">Following</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="myprofile.html" class="nav-link">Profile</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            <button class="post-btn" onclick="window.location.href='createPost.html'">Post</button>
        </aside>

        <!-- Center Content -->
        <main class="feed-main">
            <h2 class="header-center">Followers</h2>
            <ul id="followers-list"></ul>
        </main>

        <!-- Right Sidebar -->
        <aside class="feed-sidebar-right">
            <div class="right-sidebar-placeholder">
                <p>Future features</p>
            </div>
        </aside>
    </div>

    <script>
        if (!sessionStorage.getItem('user_id')) {
            window.location.href = 'index.html';
        }
    </script>
    <script src="js/script.js"></script>
    <script>
document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("user_id");
  if (!userId) return;

  const list = document.getElementById("followers-list");
  if (!list) return;

  try {
    const res = await fetch(`/api/followers/${userId}`);
    if (!res.ok) throw new Error("Failed to fetch followers");
    const users = await res.json();

    list.innerHTML = "";

    if (users.length === 0) {
      list.innerHTML = "<li>No followers yet.</li>";
      return;
    }

    users.forEach(user => {
      const li = document.createElement("li");
      li.innerHTML = `
        <a href="profile.html?user_id=${user.user_id}" class="user-card">
          <strong>${user.nickname}</strong>
        </a>
      `;
      list.appendChild(li);
    });
  } catch (err) {
    console.error(err);
    list.innerHTML = "<li>Error loading followers</li>";
  }
});
  </script>
<script>
(function() {
  const userId = sessionStorage.getItem('user_id');
  if (!userId) return;
  const list = document.getElementById('suggestions-list');
  if (!list) return;

  fetch(`/api/suggestions/${userId}`)
    .then(res => res.json())
    .then(users => {
      if (!users.length) {
        list.innerHTML = '<p style="font-size:0.85rem;color:#999;">No suggestions right now.</p>';
        return;
      }
      users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
  <a href="profile.html?user_id=${user.user_id}" style="color:#333;font-weight:500;font-size:0.9rem;text-decoration:none;">${user.nickname}</a>
  <button class="follow-suggestion-btn" data-user-id="${user.user_id}">Follow</button>
`;
        const btn = item.querySelector('.follow-suggestion-btn');
        btn.addEventListener('click', async () => {
          await fetch(`/api/follow/${user.user_id}`, {
            method: 'POST',
            credentials: 'include'
          });
          btn.textContent = 'Following';
          btn.classList.add('following');
          btn.disabled = true;
        });
        list.appendChild(item);
      });
    })
    .catch(() => {
      list.innerHTML = '<p style="font-size:0.85rem;color:#999;">Could not load suggestions.</p>';
    });
})();
</script>
<script>
  if (sessionStorage.getItem('user_id')) {
    checkUnreadNotifications();
  }
</script>
</body>
</html>
